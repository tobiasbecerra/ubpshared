<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital@1&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="navbar">
            <a href="index.html" class="brand">UBPSHARED</a>
        </div>
    </header>
    <main class="register-container">
        <h1>Registrarse</h1>
        <form class="register-form" action="welcome.html" method="POST">
            <label for="fullname">Nombre Completo:</label>
            <input type="text" id="fullname" name="fullname" placeholder="Ingrese su nombre completo" required>
            
            <label for="username">Nombre de Usuario:</label>
            <input type="text" id="username" name="username" placeholder="Ingrese su nombre de usuario" required>
            
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="Ingrese su correo electrónico" required>
            
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
            
            <button type="submit" class="register-button">Registrarse</button>
        </form>
        <p class="login-link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
    </main>
    <footer>
         <span> © 2025 UBPSHARED. Todos los derechos reservados. </span>
    </footer>
</body>
</html>
