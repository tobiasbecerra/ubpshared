<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital@1&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="navbar">
            <a href="index.php" class="brand">UBPSHARED</a>
        </div>
    </header>
    <main class="login-container">
        <h1>Iniciar Sesión</h1>
        <form class="login-form" action="dashboard.html" method="POST">
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" placeholder="Ingrese su usuario" required>
            
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
            
            <button type="submit" class="login-button">Login</button>
        </form>
        <p class="register-link">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
    </main>
    <footer>
        <span> © 2025 UBPSHARED. Todos los derechos reservados. </span>
    </footer>
</body>
</html>
